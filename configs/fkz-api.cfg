// FKZ-API Plugin - Configuration
// Place this file at: addons/sourcemod/configs/fkz-api.cfg

// API endpoint URL (supports HTTP and HTTPS)
// The plugin will POST JSON data to this URL periodically
api_url "http://api.femboykz.com/servers/status"

// API authentication key (sent as Authorization: Bearer header)
// Must match ADMIN_API_KEY in the API's .env file
// Leave empty for no authentication (not recommended)
api_key ""

// Server IP override (RECOMMENDED)
// The "hostip" ConVar often returns 0.0.0.0 which is rejected by the API.
// Set this to your server's public IP address.
// Must match the IP registered in the API's servers.json/database.
server_ip ""

// Server port override (optional, uses hostport ConVar if not set)
// Set this if hostport ConVar is incorrect.
server_port ""

// TLS CA certificate file for HTTPS requests (optional)
// Docker containers (e.g. steamrt3) may lack system CA certificates, causing
// HTTPS requests to fail with status 0 (TLS handshake / certificate error).
// Options:
//   "SYSTEM"  - Use the system CA bundle (default behavior if empty)
//   "NONE"    - Disable certificate verification (UNSAFE, testing only!)
//   "<path>"  - Path to a custom CA bundle file (relative to game directory)
// Example for steamrt3: tls_ca_file "/etc/ssl/certs/ca-certificates.crt"
tls_ca_file ""

// Reporting interval in seconds (minimum: 1, default: 10)
interval "10"
